server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/pixelmart?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:pixelmart}
    password: ${MYSQL_PASSWORD:pixelmart}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: orders
  flyway:
    enabled: true
    schemas: orders
    default-schema: orders
    locations: classpath:db/migration

pixelmart:
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}
    internal-service-name: order-service
  auth:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    internal-service-name: order-service
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
    internal-service-name: order-service
  pincode:
    api-base-url: ${PINCODE_API_BASE_URL:https://api.postalpincode.in}
    cache-ttl-hours: ${PINCODE_CACHE_TTL_HOURS:24}

management:
  endpoints:
    web:
      exposure:
        include: health,info
