spring:
  datasource:
    url: jdbc:h2:mem:auth;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS auth\;SET SCHEMA auth
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: auth
  flyway:
    enabled: false

pixelmart:
  jwt:
    secret: pixelmart-test-secret-key-min-32-chars-long!!
  auth:
    cookie:
      secure: false
