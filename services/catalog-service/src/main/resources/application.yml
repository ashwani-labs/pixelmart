server:
  port: 8082

spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/pixelmart?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:pixelmart}
    password: ${MYSQL_PASSWORD:pixelmart}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: catalog
  flyway:
    enabled: true
    schemas: catalog
    default-schema: catalog
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
