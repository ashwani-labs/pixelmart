spring:
  datasource:
    url: jdbc:h2:mem:catalog;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS catalog\;SET SCHEMA catalog
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: catalog
  flyway:
    enabled: false

pixelmart:
  internal:
    allowed-service: order-service
  storage:
    type: local
    local:
      base-path: ./target/test-uploads
