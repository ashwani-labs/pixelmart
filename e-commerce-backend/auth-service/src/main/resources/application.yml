server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/auth?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:pixelmart}
    password: ${MYSQL_PASSWORD:pixelmart}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: auth
  flyway:
    enabled: true
    schemas: auth
    default-schema: auth
    locations: classpath:db/migration

pixelmart:
  internal:
    allowed-services: order-service,catalog-service
  jwt:
    secret: ${JWT_SECRET:pixelmart-dev-secret-key-min-32-chars-long!!}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  auth:
    cookie:
      refresh-name: refresh_token
      secure: false
      same-site: Lax
      path: /api/auth

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
